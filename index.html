<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutation Pendency Dashboard | Senior Architect Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
        .bar-grow { transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#F1F5F9] text-slate-900 antialiased min-h-screen pb-12" x-data="dashboard()" x-init="init()">

    <div class="sticky top-0 z-50 glass-header border-b border-slate-200 mb-8">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-800">Mutation Pendency Analytics</h1>
                    <p class="text-[10px] uppercase font-bold text-slate-400 tracking-widest" x-text="'Updated: ' + lastSync"></p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <input type="text" x-model="search" placeholder="Search region..." class="text-xs px-4 py-2 border border-slate-200 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 w-48 md:w-64 transition-all">
                <div class="flex items-center gap-2 px-3 py-1.5 bg-white border border-slate-200 rounded-full shadow-sm">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold text-slate-600 uppercase" x-text="status"></span>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 md:px-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <template x-for="l in legends">
                <div class="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3">
                    <div :class="l.color" class="w-3 h-3 rounded-full"></div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase" x-text="l.label"></p>
                        <p class="text-xs font-bold text-slate-700" x-text="l.range"></p>
                    </div>
                </div>
            </template>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden" x-cloak>
            
            <div class="hidden md:flex bg-slate-50/50 px-8 py-4 border-b border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                <div class="w-12 text-center">Rank</div>
                <div class="flex-1">Region / Office Name</div>
                <div class="w-32">Officer Type</div>
                <div class="flex-grow max-w-md px-4">Pendency Visual</div>
                <div class="w-24 text-right">Count</div>
            </div>

            <div class="divide-y divide-slate-50">
                <template x-for="(row, index) in filteredData" :key="index">
                    <div class="flex flex-col md:flex-row md:items-center gap-4 p-6 md:px-8 hover:bg-blue-50/30 transition-all group">
                        
                        <div class="flex items-center gap-4 flex-1">
                            <div class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 font-bold text-xs group-hover:bg-blue-600 group-hover:text-white transition-colors" x-text="index + 1"></div>
                            <div>
                                <h3 class="font-bold text-slate-800 text-base md:text-lg leading-tight" x-text="row.region"></h3>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-[10px] text-slate-400 uppercase font-semibold tracking-tighter" x-text="row.location"></span>
                                    <span class="md:hidden text-[9px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded" x-text="row.officer"></span>
                                </div>
                            </div>
                        </div>

                        <div class="hidden md:block w-32">
                            <span class="text-[9px] font-bold px-2.5 py-1 bg-slate-100 text-slate-500 rounded-lg uppercase tracking-tight" x-text="row.officer"></span>
                        </div>

                        <div class="flex-grow max-w-md">
                            <div class="flex justify-between items-center mb-1 md:hidden">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Progress</span>
                                <span class="text-xs font-bold font-mono" :class="getTextColor(row.value)" x-text="row.value"></span>
                            </div>
                            <div class="bg-slate-100 h-3 rounded-full overflow-hidden flex items-center px-0.5">
                                <div :class="getSeverityBg(row.value)" 
                                     class="h-2 rounded-full bar-grow shadow-sm"
                                     :style="`width: ${(row.value / maxValue) * 100}%` ">
                                </div>
                            </div>
                        </div>

                        <div class="hidden md:block w-24 text-right">
                            <span class="text-xl font-black font-mono tracking-tighter transition-colors" 
                                  :class="getTextColor(row.value)" 
                                  x-text="row.value"></span>
                        </div>
                    </div>
                </template>
            </div>

            <template x-if="filteredData.length === 0 && !loading">
                <div class="p-20 text-center">
                    <p class="text-slate-400 font-medium italic">No results matching your filter.</p>
                </div>
            </template>

            <template x-if="loading">
                <div class="p-20 text-center">
                    <div class="inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-slate-400 font-bold uppercase text-[10px] tracking-widest">Streaming from Google Sheets...</p>
                </div>
            </template>
        </div>
    </main>

    <script>
        function dashboard() {
            return {
                data: [],
                search: '',
                loading: true,
                maxValue: 1,
                status: 'Connecting...',
                lastSync: '---',
                sheetUrl: 'https://docs.google.com/spreadsheets/d/1j_IOqUATkTtY84g6HC792pQ4Z96TNy9yjz_RXDMXrIo/gviz/tq?tqx=out:csv',
                
                legends: [
                    { label: 'Critical', range: '> 500', color: 'bg-red-500' },
                    { label: 'High', range: '300 - 500', color: 'bg-orange-500' },
                    { label: 'Moderate', range: '150 - 299', color: 'bg-yellow-500' },
                    { label: 'Low', range: '< 150', color: 'bg-green-500' }
                ],

                init() {
                    this.fetchData();
                    setInterval(() => this.fetchData(), 30000); 
                },

                fetchData() {
                    this.status = 'Updating...';
                    Papa.parse(this.sheetUrl, {
                        download: true,
                        header: true,
                        complete: (results) => {
                            // Extract data based on column order
                            this.data = results.data.map(item => {
                                const vals = Object.values(item);
                                return {
                                    region: vals[0],
                                    location: vals[1],
                                    officer: vals[2],
                                    value: parseInt(vals[3]) || 0
                                };
                            }).filter(i => i.region && i.region !== "");

                            this.maxValue = Math.max(...this.data.map(d => d.value), 1);
                            this.loading = false;
                            this.status = 'Live';
                            this.lastSync = new Date().toLocaleTimeString();
                        }
                    });
                },

                get filteredData() {
                    if (this.search === '') return this.data;
                    return this.data.filter(i => 
                        i.region.toLowerCase().includes(this.search.toLowerCase()) || 
                        i.location.toLowerCase().includes(this.search.toLowerCase())
                    );
                },

                getSeverityBg(val) {
                    if (val > 500) return 'bg-gradient-to-r from-red-600 to-red-400';
                    if (val >= 300) return 'bg-gradient-to-r from-orange-500 to-orange-300';
                    if (val >= 150) return 'bg-gradient-to-r from-yellow-500 to-yellow-300';
                    return 'bg-gradient-to-r from-green-500 to-green-300';
                },

                getTextColor(val) {
                    if (val > 500) return 'text-red-600';
                    if (val >= 300) return 'text-orange-500';
                    if (val >= 150) return 'text-yellow-600';
                    return 'text-green-600';
                }
            }
        }
    </script>
</body>
</html>
