<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutation Pendency | Real-Time Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
        
        /* Smooth scale animation for progress bars */
        .bar-transition { 
            transition: width 1.2s cubic-bezier(0.65, 0, 0.35, 1); 
        }

        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Ensure the layout doesn't "jump" during refresh */
        .data-grid { display: grid; grid-template-columns: 60px 1fr 140px 250px 100px; align-items: center; }
        @media (max-width: 768px) {
            .data-grid { grid-template-columns: 40px 1fr 80px; }
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 antialiased" x-data="dashboard()" x-init="init()">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Mutation Pendency</h1>
                    <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold" x-text="'Last Sync: ' + lastUpdated"></p>
                </div>
            </div>

            <div class="mt-4 md:mt-0 flex items-center gap-4">
                <input type="text" x-model="search" placeholder="Search region..." 
                    class="bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-64 transition-all">
                <div class="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-100">
                    <div class="w-2 h-2 bg-indigo-600 rounded-full animate-pulse"></div>
                    <span class="text-[10px] font-bold text-indigo-600 uppercase" x-text="status"></span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <template x-for="l in legends">
                <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-4 hover:shadow-md transition-shadow">
                    <div :class="l.bg" class="w-10 h-10 rounded-xl flex items-center justify-center shadow-inner">
                        <div :class="l.dot" class="w-3 h-3 rounded-full"></div>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase" x-text="l.label"></p>
                        <p class="text-sm font-extrabold text-slate-700" x-text="l.range"></p>
                    </div>
                </div>
            </template>
        </div>

        <div class="bg-white rounded-[1.5rem] border border-slate-200 shadow-sm overflow-hidden" x-cloak>
            
            <div class="data-grid hidden md:grid bg-slate-50/80 px-8 py-4 border-b border-slate-200 text-[10px] font-bold uppercase text-slate-500 tracking-wider">
                <div class="text-center">Rank</div>
                <div>Region & Office</div>
                <div>Officer</div>
                <div class="px-4">Pendency Intensity</div>
                <div class="text-right">Total</div>
            </div>

            <div class="divide-y divide-slate-100">
                <template x-for="(row, index) in filteredData" :key="index">
                    <div class="data-grid p-4 md:px-8 hover:bg-slate-50/50 transition-colors cursor-default group">
                        
                        <div class="flex justify-center">
                            <span class="text-xs font-bold text-slate-400 group-hover:text-indigo-600 transition-colors" x-text="'#' + (index+1)"></span>
                        </div>

                        <div class="pr-4">
                            <p class="font-bold text-slate-800 text-sm md:text-base mb-0.5" x-text="row.region"></p>
                            <p class="text-[10px] font-medium text-slate-400 uppercase tracking-tight" x-text="row.location"></p>
                        </div>

                        <div class="hidden md:block">
                            <span class="inline-block px-2.5 py-1 rounded-md bg-slate-100 text-slate-600 text-[9px] font-bold uppercase" x-text="row.officer"></span>
                        </div>

                        <div class="px-0 md:px-4">
                            <div class="flex justify-between items-center mb-1.5 md:hidden">
                                <span class="text-[10px] font-bold text-slate-400 uppercase" x-text="row.officer"></span>
                                <span class="text-xs font-bold" :class="getTextColor(row.value)" x-text="row.value"></span>
                            </div>
                            <div class="bg-slate-100 h-2.5 rounded-full overflow-hidden flex items-center">
                                <div :class="getBarColor(row.value)" 
                                     class="h-full rounded-full bar-transition shadow-sm"
                                     :style="`width: ${(row.value / maxValue) * 100}%` ">
                                </div>
                            </div>
                        </div>

                        <div class="text-right">
                            <span class="text-lg font-extrabold font-mono" :class="getTextColor(row.value)" x-text="row.value"></span>
                        </div>
                    </div>
                </template>
            </div>

            <template x-if="loading">
                <div class="p-20 text-center space-y-4">
                    <div class="w-8 h-8 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin inline-block"></div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Aggregating real-time data...</p>
                </div>
            </template>
        </div>
    </main>

    <script>
        function dashboard() {
            return {
                data: [],
                search: '',
                loading: true,
                maxValue: 1,
                status: 'Connecting',
                lastUpdated: '--:--',
                sheetUrl: 'https://docs.google.com/spreadsheets/d/1j_IOqUATkTtY84g6HC792pQ4Z96TNy9yjz_RXDMXrIo/gviz/tq?tqx=out:csv',
                
                legends: [
                    { label: 'Critical', range: '500+', bg: 'bg-red-50', dot: 'bg-red-500' },
                    { label: 'High', range: '300-500', bg: 'bg-orange-50', dot: 'bg-orange-500' },
                    { label: 'Moderate', range: '150-299', bg: 'bg-yellow-50', dot: 'bg-yellow-500' },
                    { label: 'Low', range: '< 150', bg: 'bg-green-50', dot: 'bg-green-500' }
                ],

                init() {
                    this.fetch();
                    setInterval(() => this.fetch(), 30000);
                },

                fetch() {
                    this.status = 'Refreshing';
                    Papa.parse(this.sheetUrl, {
                        download: true,
                        header: true,
                        complete: (res) => {
                            this.data = res.data.map(item => {
                                const v = Object.values(item);
                                return { region: v[0], location: v[1], officer: v[2], value: parseInt(v[3]) || 0 };
                            }).filter(i => i.region);
                            
                            this.maxValue = Math.max(...this.data.map(d => d.value), 1);
                            this.loading = false;
                            this.status = 'Live Sync';
                            this.lastUpdated = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        }
                    });
                },

                get filteredData() {
                    return this.data.filter(i => i.region.toLowerCase().includes(this.search.toLowerCase()));
                },

                getBarColor(v) {
                    if (v > 500) return 'bg-red-500';
                    if (v >= 300) return 'bg-orange-500';
                    if (v >= 150) return 'bg-yellow-500';
                    return 'bg-green-500';
                },

                getTextColor(v) {
                    if (v > 500) return 'text-red-600';
                    if (v >= 300) return 'text-orange-600';
                    if (v >= 150) return 'text-yellow-600';
                    return 'text-green-600';
                }
            }
        }
    </script>
</body>
</html>
